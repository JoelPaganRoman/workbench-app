name: Build & Sign Workbench Swift (macOS)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal .app (arm64 + Intel)
        run: |
          cd Workbench-Swift
          xcodebuild \
            -project Workbench.xcodeproj \
            -target Workbench \
            -configuration Release \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            SYMROOT=build \
            build

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - "Workbench-Swift/build/Release/Workbench.app"

      - name: Verify signature
        run: codesign --verify --verbose "Workbench-Swift/build/Release/Workbench.app"

      - name: Zip signed app
        run: |
          cd Workbench-Swift/build/Release
          zip -r -y "$GITHUB_WORKSPACE/Workbench-mac.zip" "Workbench.app"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Workbench-mac
          path: Workbench-mac.zip

      - name: Publish GitHub Release (only when pushing a tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Workbench-mac.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
