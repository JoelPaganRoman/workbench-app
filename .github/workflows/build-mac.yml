name: Build & Sign Workbench (macOS)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build universal .app (arm64 + Intel)
        run: npx electron-builder --mac --universal --dir

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - "dist/mac-universal/Workbench.app"

      - name: Verify signature
        run: codesign --verify --verbose "dist/mac-universal/Workbench.app"

      - name: Zip signed app
        run: |
          cd dist/mac-universal
          zip -r -y "$GITHUB_WORKSPACE/Workbench-mac.zip" "Workbench.app"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Workbench-mac
          path: Workbench-mac.zip

      - name: Publish GitHub Release (only when pushing a tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Workbench-mac.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
