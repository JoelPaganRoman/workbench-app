<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000000;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    color: #e8eaed;
    -webkit-app-region: drag;
    overflow: hidden;
  }
  #wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 26px 28px;
  }
  h1 { font-size: 15px; font-weight: 650; margin-bottom: 18px; letter-spacing: -0.2px; }

  .row {
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .row-label { font-size: 13px; font-weight: 500; }
  .row-sub { font-size: 11px; color: rgba(230,232,235,0.45); margin-top: 2px; }

  .segmented {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .seg-btn {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(230,232,235,0.6);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .seg-btn.active { background: rgba(255,255,255,0.16); color: #fff; }

  #updateBtn {
    -webkit-app-region: no-drag;
    background: rgba(255,255,255,0.06);
    color: #e8eaed;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  #updateBtn:hover { background: rgba(255,255,255,0.11); }

  #footer {
    margin-top: auto;
    padding-top: 18px;
    font-size: 11px;
    color: rgba(230,232,235,0.35);
    text-align: center;
  }
</style>
</head>
<body>
  <div id="wrap">
    <h1>Workbench Preferences</h1>

    <div class="row">
      <div>
        <div class="row-label">Tab position</div>
        <div class="row-sub">Where Docs, Sheets, Slides, Gemini and Drive tabs appear</div>
      </div>
      <div class="segmented" id="tabPositionGroup">
        <div class="seg-btn" data-value="top">Top</div>
        <div class="seg-btn" data-value="left">Left</div>
      </div>
    </div>

    <div class="row">
      <div>
        <div class="row-label">Software update</div>
        <div class="row-sub">Check GitHub for a newer version</div>
      </div>
      <button id="updateBtn">Check Now</button>
    </div>

    <div id="footer"><span id="versionTag"></span></div>
  </div>

  <script>
    const tabPositionButtons = document.querySelectorAll('#tabPositionGroup .seg-btn');
    const updateBtn = document.getElementById('updateBtn');

    function applyToUI(settings) {
      tabPositionButtons.forEach((b) => b.classList.toggle('active', b.dataset.value === settings.tabPosition));
    }

    window.settingsAPI.getSettings().then(applyToUI);
    window.settingsAPI.getAppVersion().then((v) => {
      document.getElementById('versionTag').textContent = 'Workbench v' + v;
    });

    tabPositionButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        tabPositionButtons.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        window.settingsAPI.saveSettings({ tabPosition: btn.dataset.value });
      });
    });

    updateBtn.addEventListener('click', () => window.settingsAPI.checkForUpdates());
  </script>
</body>
</html>
