<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000000;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    user-select: none;
    overflow: hidden;
  }

  #chrome { position: relative; z-index: 1; width: 100%; height: 100%; }

  /* ---------- Chrome container: adapts to top bar or left sidebar ---------- */
  #topbar {
    position: relative;
    -webkit-app-region: drag;
    background: #000000;
  }
  body.layout-top #topbar {
    width: 100%; height: 48px;
    display: flex; align-items: center; padding: 0 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.09);
  }
  body.layout-left #topbar {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 68px; /* clear the traffic lights */
    border-right: 1px solid rgba(255, 255, 255, 0.09);
  }

  .tabs {
    -webkit-app-region: no-drag;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border-radius: 22px;
    border: 1px solid rgba(255, 255, 255, 0.07);
  }
  body.layout-top .tabs {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    display: flex; gap: 4px; padding: 4px;
  }
  body.layout-left .tabs {
    display: flex; flex-direction: column; gap: 4px; padding: 4px;
  }

  .tab {
    padding: 6px 16px;
    border-radius: 18px;
    color: rgba(235, 237, 240, 0.6);
    font-size: 13px;
    font-weight: 510;
    cursor: pointer;
    background: transparent;
    border: 1px solid transparent;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.1s ease, box-shadow 0.18s ease;
    text-align: center;
  }
  body.layout-left .tab {
    padding: 8px 6px;
    width: 40px;
    font-size: 10.5px;
    font-weight: 650;
    letter-spacing: 0.3px;
  }
  .tab:hover { background: rgba(255, 255, 255, 0.07); color: #f1f2f4; }
  .tab.active {
    background: rgba(255, 255, 255, 0.16);
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.22);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.4),
      inset 0 -1px 0 rgba(0, 0, 0, 0.15),
      0 3px 10px rgba(0, 0, 0, 0.3);
  }
  .tab:active { transform: scale(0.96); }

  #splitBtn {
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 15px;
    border-radius: 20px;
    color: rgba(235, 237, 240, 0.75);
    font-size: 12.5px;
    font-weight: 510;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(16px) saturate(150%);
    -webkit-backdrop-filter: blur(16px) saturate(150%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    transition: background 0.18s ease, color 0.18s ease;
  }
  body.layout-top #splitBtn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  }
  body.layout-left #splitBtn {
    margin-top: auto;
    margin-bottom: 16px;
    padding: 8px 8px;
    font-size: 10px;
    flex-direction: column;
    gap: 3px;
  }
  #splitBtn:hover { background: rgba(255, 255, 255, 0.11); color: #fff; }
  #splitBtn.active {
    background: rgba(90, 130, 220, 0.5);
    border-color: rgba(140, 178, 255, 0.5);
    color: #fff;
  }
  #splitBtn svg { width: 13px; height: 13px; }

  /* ---------- Pane bar: second row (top mode) ---------- */
  #panebar {
    display: none;
    height: 38px;
    background: #000000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    align-items: center;
    justify-content: center;
  }
  body.layout-top #panebar.visible { display: flex; }
  .pane-half {
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 0 10px;
  }
  .pane-half.right { border-left: 1px solid rgba(255, 255, 255, 0.07); }
  .mini-tab {
    padding: 5px 12px;
    border-radius: 14px;
    color: rgba(190, 194, 199, 0.75);
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
  }
  .mini-tab:hover { background: rgba(255, 255, 255, 0.06); color: #e3e5e8; }
  .mini-tab.active {
    background: rgba(255, 255, 255, 0.14);
    border-color: rgba(255, 255, 255, 0.2);
    color: #ffffff;
  }

  #closeSplit {
    -webkit-app-region: no-drag;
    margin: 0 12px;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: rgba(220, 222, 226, 0.7);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    cursor: pointer;
    font-size: 12px;
    transition: background 0.18s ease, color 0.18s ease;
  }
  #closeSplit:hover { background: rgba(255, 80, 80, 0.35); color: #fff; }

  /* ---------- Pane target picker: left-sidebar mode, split only ---------- */
  #paneTargetPicker {
    display: none;
    -webkit-app-region: no-drag;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
    padding: 6px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.07);
  }
  body.layout-left #paneTargetPicker.visible { display: flex; }
  .pane-target-row { display: flex; gap: 4px; }
  .pane-target-btn {
    width: 22px; height: 22px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10.5px; font-weight: 700;
    color: rgba(230, 232, 235, 0.55);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .pane-target-btn:hover { background: rgba(255, 255, 255, 0.08); }
  .pane-target-btn.active { background: rgba(90, 130, 220, 0.55); color: #fff; }
  #paneTargetPicker #closeSplitLeft { margin: 0; width: 22px; height: 22px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; color: rgba(220,222,226,0.7);
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; font-size: 11px; }
  #paneTargetPicker #closeSplitLeft:hover { background: rgba(255, 80, 80, 0.35); color: #fff; }
</style>
</head>
<body class="layout-top">
  <div id="chrome">
    <div id="topbar">
      <div id="paneTargetPicker">
        <div class="pane-target-row">
          <div class="pane-target-btn active" data-pane="left">L</div>
          <div class="pane-target-btn" data-pane="right">R</div>
        </div>
        <div id="closeSplitLeft">✕</div>
      </div>
      <div class="tabs" id="mainTabs">
        <div class="tab" data-key="docs" title="Docs">Docs</div>
        <div class="tab" data-key="sheets" title="Sheets">Sheets</div>
        <div class="tab" data-key="slides" title="Slides">Slides</div>
        <div class="tab" data-key="gemini" title="Gemini">Gemini</div>
        <div class="tab" data-key="drive" title="Drive">Drive</div>
      </div>
      <div id="splitBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/>
        </svg>
        Split
      </div>
    </div>

    <div id="panebar">
      <div class="pane-half left" id="leftPaneTabs"></div>
      <div id="closeSplit">✕</div>
      <div class="pane-half right" id="rightPaneTabs"></div>
    </div>
  </div>

  <script>
    const KEYS = ['docs', 'sheets', 'slides', 'gemini', 'drive'];
    const LABELS = { docs: 'Docs', sheets: 'Sheets', slides: 'Slides', gemini: 'Gemini', drive: 'Drive' };
    const SHORT_LABELS = { docs: 'Doc', sheets: 'Sht', slides: 'Sld', gemini: 'Gem', drive: 'Drv' };

    const body = document.body;
    const mainTabs = document.querySelectorAll('#mainTabs .tab');
    const splitBtn = document.getElementById('splitBtn');
    const paneBar = document.getElementById('panebar');
    const leftPaneTabs = document.getElementById('leftPaneTabs');
    const rightPaneTabs = document.getElementById('rightPaneTabs');
    const closeSplitBtn = document.getElementById('closeSplit');
    const paneTargetPicker = document.getElementById('paneTargetPicker');
    const closeSplitLeftBtn = document.getElementById('closeSplitLeft');
    const paneTargetButtons = paneTargetPicker.querySelectorAll('.pane-target-btn');

    let currentLayout = 'top';
    let currentSplitMode = false;
    let activePaneTarget = 'left'; // used only in layout-left split mode

    function applyLayout(tabPosition) {
      currentLayout = tabPosition;
      body.classList.toggle('layout-left', tabPosition === 'left');
      body.classList.toggle('layout-top', tabPosition !== 'left');
      mainTabs.forEach((t) => {
        t.textContent = tabPosition === 'left' ? SHORT_LABELS[t.dataset.key] : LABELS[t.dataset.key];
      });
      refreshPaneTargetPicker();
    }

    function refreshPaneTargetPicker() {
      const show = currentLayout === 'left' && currentSplitMode;
      paneTargetPicker.classList.toggle('visible', show);
    }

    window.tabAPI.getSettings().then((settings) => applyLayout(settings.tabPosition));
    window.tabAPI.onSettingsChanged((settings) => applyLayout(settings.tabPosition));

    mainTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        if (currentLayout === 'left' && currentSplitMode) {
          window.tabAPI.selectPaneTab(activePaneTarget, tab.dataset.key);
        } else {
          window.tabAPI.switchTab(tab.dataset.key);
        }
      });
    });

    paneTargetButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        activePaneTarget = btn.dataset.pane;
        paneTargetButtons.forEach((b) => b.classList.toggle('active', b === btn));
      });
    });

    splitBtn.addEventListener('click', () => window.tabAPI.toggleSplit());
    closeSplitBtn.addEventListener('click', () => window.tabAPI.closeSplit());
    closeSplitLeftBtn.addEventListener('click', () => window.tabAPI.closeSplit());

    function buildMiniTabs(container, pane, activeKey) {
      container.innerHTML = '';
      KEYS.forEach(key => {
        const el = document.createElement('div');
        el.className = 'mini-tab' + (key === activeKey ? ' active' : '');
        el.textContent = LABELS[key];
        el.addEventListener('click', () => window.tabAPI.selectPaneTab(pane, key));
        container.appendChild(el);
      });
    }

    window.tabAPI.onPanesChanged((panes, splitMode) => {
      currentSplitMode = splitMode;
      mainTabs.forEach(t => t.classList.toggle('active', t.dataset.key === panes.left || t.dataset.key === panes.right));
      splitBtn.classList.toggle('active', splitMode);
      paneBar.classList.toggle('visible', splitMode);
      refreshPaneTargetPicker();
      if (splitMode) {
        buildMiniTabs(leftPaneTabs, 'left', panes.left);
        buildMiniTabs(rightPaneTabs, 'right', panes.right);
      }
    });
  </script>
</body>
</html>
